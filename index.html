<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>✨ lallou · soutenance ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fce9f0 0%, #f8dbe9 100%);
            font-family: 'Quicksand', sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ---- floating decorations ---- */
        .confetti-piece {
            position: fixed;
            border-radius: 50% 50% 0 50%;
            transform: rotate(45deg);
            pointer-events: none;
            z-index: 0;
            animation: floatConfetti 12s infinite alternate ease-in-out;
        }

        .confetti-piece:nth-child(1) { top: 5%; left: 3%; width: 25px; height: 25px; background: #ffb7c5; animation-duration: 14s; }
        .confetti-piece:nth-child(2) { bottom: 8%; right: 2%; width: 35px; height: 35px; background: #ffd3b5; animation-duration: 18s; animation-delay: 2s; }
        .confetti-piece:nth-child(3) { top: 15%; right: 8%; width: 20px; height: 20px; background: #b8e0d2; animation-duration: 16s; animation-delay: 1s; }
        .confetti-piece:nth-child(4) { bottom: 20%; left: 5%; width: 30px; height: 30px; background: #f9e6b3; animation-duration: 20s; animation-delay: 0.5s; }
        .confetti-piece:nth-child(5) { top: 50%; left: 1%; width: 18px; height: 18px; background: #d9c8f0; animation-duration: 13s; }
        .confetti-piece:nth-child(6) { top: 65%; right: 5%; width: 22px; height: 22px; background: #fbc4c4; animation-duration: 17s; animation-delay: 3s; }

        @keyframes floatConfetti {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.5; }
            50% { transform: translate(25px, -15px) rotate(180deg) scale(1.1); opacity: 0.8; }
            100% { transform: translate(-10px, 20px) rotate(360deg) scale(0.9); opacity: 0.4; }
        }

        /* ---- main card ---- */
        .card {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 248, 245, 0.9);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 60px;
            box-shadow: 0 25px 50px rgba(200, 120, 140, 0.25);
            padding: 2rem 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 220, 220, 0.4);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card:active {
            transform: scale(0.97);
        }

        .click-box {
            background: rgba(255, 240, 235, 0.5);
            border-radius: 50px;
            padding: 2.2rem 1.5rem;
            border: 2px dashed #fbc4c4;
            transition: 0.3s;
            position: relative;
        }

        .card.clicked .click-box {
            background: rgba(255, 225, 220, 0.6);
            border: 2px solid #f5a3b0;
            box-shadow: 0 0 0 4px rgba(255, 170, 180, 0.2);
        }

        .icon-big {
            font-size: 4.5rem;
            line-height: 1.2;
            margin-bottom: 0.1rem;
            display: block;
            transition: 0.3s;
        }

        .card.clicked .icon-big {
            transform: scale(0.9) rotate(-5deg);
        }

        .hint-text {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b36a7a, #d47b8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.2rem 0;
        }

        .sub-hint {
            font-size: 1rem;
            font-weight: 600;
            color: #b2828e;
            letter-spacing: 0.5px;
            margin-top: -0.1rem;
        }

        .reveal-content {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px dotted #f5c0cb;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: opacity 0.6s ease, max-height 0.7s ease, margin 0.3s;
            visibility: hidden;
            pointer-events: none;
        }

        .card.clicked .reveal-content {
            opacity: 1;
            max-height: 900px;
            visibility: visible;
            pointer-events: auto;
            margin-top: 1.8rem;
        }

        .date-big {
            font-size: 3rem;
            font-weight: 700;
            color: #55343e;
            background: linear-gradient(145deg, #fad6d6, #ffe2e2);
            display: inline-block;
            padding: 0.4rem 1.8rem;
            border-radius: 100px;
            box-shadow: 0 4px 0 #dba6b2, 0 10px 25px rgba(200, 100, 120, 0.15);
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .time-badge {
            font-size: 1.8rem;
            font-weight: 600;
            color: #5f3e49;
            background: #ffebee;
            padding: 0.2rem 1.5rem;
            border-radius: 60px;
            display: inline-block;
            margin: 0.4rem 0 0.6rem;
            box-shadow: inset 0 -3px 0 #f5b7c2;
        }

        .name-glow {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #ad6275, #d47b8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            letter-spacing: 2px;
            margin: 0.2rem 0;
        }

        .cute-extra {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1.2rem;
            margin: 1rem 0 0.2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #6a4b55;
        }

        .cute-extra span {
            background: rgba(255, 215, 215, 0.4);
            padding: 0.3rem 1rem;
            border-radius: 80px;
            border: 1px solid #ffe2e2;
        }

        .tiny-message {
            margin-top: 1rem;
            font-size: 1.1rem;
            color: #7f5b67;
            background: #fff4f1;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid #fad1d1;
        }

        .click-cta {
            display: inline-block;
            margin-top: 0.8rem;
            font-size: 0.95rem;
            background: #fad6d6;
            padding: 0.3rem 1.5rem;
            border-radius: 50px;
            color: #7d4b5a;
            font-weight: 600;
            border: 1px solid #fcc;
            transition: 0.2s;
        }

        .card.clicked .click-cta {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
            transition: 0.2s;
        }

        .heart-pulse {
            display: inline-block;
            animation: pulseHeart 2s infinite;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); color: #d45a6a; }
        }

        .star-rotate {
            display: inline-block;
            animation: spinStar 6s linear infinite;
        }

        @keyframes spinStar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .emoji-row {
            margin-top: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            font-size: 1.8rem;
        }

        .venue-line {
            margin-top: 0.3rem;
            font-size: 0.9rem;
            color: #b38490;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* ======================================== */
        /* ✅ PERFECT PROPORTIONS FOR PHONES       */
        /* ======================================== */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .card {
                padding: 1.2rem 1rem;
                border-radius: 45px;
            }

            .click-box {
                padding: 1.8rem 1.2rem;
                border-radius: 35px;
            }

            .icon-big {
                font-size: 3.8rem;
            }

            .hint-text {
                font-size: 1.6rem;
            }

            .sub-hint {
                font-size: 0.95rem;
            }

            .date-big {
                font-size: 2.4rem;
                padding: 0.3rem 1.2rem;
                border-radius: 60px;
            }

            .time-badge {
                font-size: 1.4rem;
                padding: 0.2rem 1.2rem;
                border-radius: 40px;
            }

            .name-glow {
                font-size: 1.8rem;
            }

            .cute-extra {
                font-size: 1rem;
                gap: 0.5rem 0.8rem;
            }

            .cute-extra span {
                padding: 0.25rem 0.8rem;
                border-radius: 40px;
            }

            .tiny-message {
                font-size: 1rem;
                padding: 0.3rem 1rem;
            }

            .click-cta {
                font-size: 0.85rem;
                padding: 0.3rem 1.2rem;
            }

            .emoji-row {
                font-size: 1.6rem;
                gap: 0.5rem;
            }

            .venue-line {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 1rem 0.8rem;
                border-radius: 35px;
            }

            .click-box {
                padding: 1.5rem 0.8rem;
                border-radius: 28px;
            }

            .icon-big {
                font-size: 3.2rem;
            }

            .hint-text {
                font-size: 1.4rem;
            }

            .date-big {
                font-size: 2rem;
                padding: 0.2rem 0.8rem;
                border-radius: 40px;
            }

            .time-badge {
                font-size: 1.2rem;
                padding: 0.15rem 0.8rem;
            }

            .name-glow {
                font-size: 1.5rem;
            }

            .cute-extra {
                font-size: 0.85rem;
                gap: 0.3rem 0.6rem;
            }

            .cute-extra span {
                padding: 0.2rem 0.6rem;
            }

            .tiny-message {
                font-size: 0.9rem;
                padding: 0.2rem 0.8rem;
            }

            .click-cta {
                font-size: 0.75rem;
                padding: 0.2rem 1rem;
            }

            .emoji-row {
                font-size: 1.3rem;
                gap: 0.3rem;
            }

            .venue-line {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>
    <div class="confetti-piece"></div>

    <div class="card" id="magicCard">
        <div class="click-box" id="clickBox">
            <span class="icon-big">🌸</span>
            <div class="hint-text">✨ lallou's soutenance ✨</div>
            <div class="sub-hint">📌 click anywhere on the box</div>

            <div class="reveal-content" id="revealArea">
                <div>
                    <span class="date-big">
                        <span class="heart-pulse">❤️</span> 02/07/2026 <span class="heart-pulse">❤️</span>
                    </span>
                </div>
                <div class="time-badge">
                    🕒 12h30 – 13h30
                </div>
                <div>
                    <span class="name-glow">
                        <span class="star-rotate">✦</span> ✨ you're invited <span class="star-rotate">✦</span>
                    </span>
                </div>

                <div class="cute-extra">
                    <span>🎀 soutenance</span>
                    <span>🧁 100% réussite</span>
                    <span>✨ ma tribu</span>
                    <span>💫 on se voit là-bas !</span>
                </div>

                <div class="tiny-message">
                    💖 avec tout mon cœur 💖
                </div>

                <div class="emoji-row">
                    <span>🐣</span>
                    <span>🍭</span>
                    <span>🦋</span>
                    <span>🌈</span>
                    <span>🧸</span>
                </div>

                <div class="venue-line">
                    ⭐ 02.07.2026 · Université Centrale ⭐
                </div>
            </div>

            <div class="click-cta" id="clickCta">
                👆 touche-moi !
            </div>
        </div>
    </div>

    <script>
        (function() {
            const card = document.getElementById('magicCard');
            const clickBox = document.getElementById('clickBox');

            function launchConfetti() {
                const colors = ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#e0bbff', '#ffccd5', '#fbc4c4'];
                for (let i = 0; i < 25; i++) {
                    const conf = document.createElement('div');
                    conf.style.position = 'fixed';
                    conf.style.width = (Math.random() * 12 + 6) + 'px';
                    conf.style.height = (Math.random() * 12 + 6) + 'px';
                    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
                    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '30% 70% 50% 50%';
                    conf.style.left = (Math.random() * 80 + 10) + '%';
                    conf.style.top = (Math.random() * 80 + 10) + '%';
                    conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                    conf.style.zIndex = '999';
                    conf.style.pointerEvents = 'none';
                    conf.style.transition = 'all 1.2s cubic-bezier(0.34, 1.4, 0.64, 1)';
                    document.body.appendChild(conf);

                    requestAnimationFrame(() => {
                        conf.style.transform = `translate(${Math.random() * 140 - 70}px, ${Math.random() * -120 - 30}px) scale(0.1) rotate(${Math.random() * 400}deg)`;
                        conf.style.opacity = '0';
                    });

                    setTimeout(() => conf.remove(), 1400);
                }
            }

            function handleClick(e) {
                if (card.classList.contains('clicked')) {
                    card.style.transform = 'scale(0.97)';
                    setTimeout(() => { card.style.transform = ''; }, 120);
                    return;
                }
                card.classList.add('clicked');
                launchConfetti();
            }

            card.addEventListener('click', handleClick);
            clickBox.addEventListener('click', function(e) {
                e.stopPropagation();
                handleClick(e);
            });

            console.log('🌸 lallou soutenance 02/07/2026');
        })();
    </script>
</body>
</html>
